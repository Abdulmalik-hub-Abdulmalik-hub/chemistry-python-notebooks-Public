name: innovachem_labsuite
description: "InnovaChem LabSuite - A professional cross-platform scientific chemistry software platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.7.0
  
  # Navigation
  go_router: ^14.2.7
  
  # Charts and Visualization
  fl_chart: ^0.68.0
  
  # Math and Scientific Calculations
  math_expressions: ^2.6.0
  vector_math: ^2.1.4
  
  # Local Storage
  shared_preferences: ^2.3.2
  
  # Utilities
  collection: ^1.18.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
